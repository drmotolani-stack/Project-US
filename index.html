<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Space</title>

    <!-- Web App Manifest & Mobile Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#4B3A63">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dusk: {
                            deep: '#3D3159',
                            plum: '#5A4470',
                            mauve: '#8C6A8B',
                            rose: '#C88A93',
                            peach: '#F0C6A0',
                            gold: '#E3B274',
                            ink: '#3A2E4D',
                            sage: '#7FA98A',
                            mist: '#FBF6F1'
                        }
                    },
                    fontFamily: {
                        display: ['"Fraunces"', 'serif'],
                        body: ['"Outfit"', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; }

        html, body {
            font-family: 'Outfit', sans-serif;
            height: 100%;
        }

        .font-display { font-family: 'Fraunces', serif; }

        /* ---------- Dreamy sky backdrop ---------- */
        .sky {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(180deg,
                #3D3159 0%,
                #5A4470 24%,
                #8C6A8B 52%,
                #C88A93 74%,
                #F0C6A0 100%);
            overflow: hidden;
        }

        .sky::before {
            /* soft horizon glow */
            content: '';
            position: absolute;
            bottom: -20%;
            left: 50%;
            width: 140%;
            height: 60%;
            transform: translateX(-50%);
            background: radial-gradient(ellipse at center, rgba(255,224,178,0.55) 0%, rgba(255,224,178,0) 65%);
            filter: blur(10px);
        }

        .stars {
            position: absolute;
            inset: 0;
            background-repeat: repeat;
            opacity: 0.9;
        }
        .stars span {
            position: absolute;
            display: block;
            border-radius: 50%;
            background: #FBF6F1;
            animation: twinkle 4.5s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.15; transform: scale(0.8); }
            50% { opacity: 0.95; transform: scale(1.15); }
        }

        .moon {
            position: absolute;
            top: 6%;
            right: 12%;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #FFF9EE, #F3DFB0 60%, #E3B274 100%);
            box-shadow: 0 0 40px 10px rgba(243, 223, 176, 0.45);
            opacity: 0.9;
        }

        /* ---------- Glass surfaces ---------- */
        .glass {
            background: linear-gradient(155deg, rgba(255,255,255,0.62), rgba(255,255,255,0.32));
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.55);
            box-shadow: 0 10px 34px -6px rgba(58, 46, 77, 0.28), inset 0 1px 0 rgba(255,255,255,0.5);
        }

        .glass-deep {
            background: linear-gradient(155deg, rgba(58,46,77,0.55), rgba(58,46,77,0.35));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 10px 34px -6px rgba(20, 14, 30, 0.4);
        }

        /* ---------- Signature: breathing choose button ---------- */
        .breathe-btn {
            position: relative;
            background: linear-gradient(135deg, #E3B274, #C88A93);
            box-shadow: 0 0 0 0 rgba(227, 178, 116, 0.55);
            animation: breathe 3.6s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 0 0 rgba(227, 178, 116, 0.45), 0 8px 24px -4px rgba(200,138,147,0.5); }
            50% { box-shadow: 0 0 0 14px rgba(227, 178, 116, 0), 0 8px 24px -4px rgba(200,138,147,0.5); }
        }

        .chosen-heart {
            animation: rise-fade 0.6s ease-out;
        }
        @keyframes rise-fade {
            0% { opacity: 0; transform: translateY(6px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ---------- Record button glow while active ---------- */
        .record-btn.is-recording {
            box-shadow: 0 0 0 8px rgba(200, 138, 147, 0.18);
        }

        /* ---------- Nav pill ---------- */
        .nav-pill {
            background: linear-gradient(155deg, rgba(255,255,255,0.75), rgba(255,255,255,0.5));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 12px 30px -8px rgba(58,46,77,0.35);
        }

        .nav-btn.active-nav {
            color: #3A2E4D;
        }
        .nav-btn .nav-dot {
            width: 4px; height: 4px; border-radius: 50%;
            background: transparent;
            margin-top: 3px;
            transition: background 0.25s ease;
        }
        .nav-btn.active-nav .nav-dot {
            background: #C88A93;
        }

        ::-webkit-scrollbar { width: 0px; }

        textarea::placeholder { color: rgba(58,46,77,0.4); }

        @media (prefers-reduced-motion: reduce) {
            .breathe-btn, .stars span { animation: none !important; }
        }
    </style>
</head>
<body class="text-dusk-ink antialiased selection:bg-dusk-rose selection:text-white select-none h-screen flex flex-col overflow-hidden relative">

    <!-- Dreamy sky background -->
    <div class="sky" aria-hidden="true">
        <div class="moon"></div>
        <div class="stars" id="star-field"></div>
    </div>

    <!-- Top Bar -->
    <header class="pt-7 pb-4 px-6 z-10 flex justify-between items-end shrink-0 relative">
        <div>
            <p class="font-display italic text-3xl tracking-wide text-dusk-mist drop-shadow-sm">Our Space</p>
            <p class="text-xs text-dusk-mist/80 mt-1 font-body tracking-wide" id="greeting">A quiet place, just for us</p>
        </div>
        <select id="user-identity" class="glass text-xs text-dusk-ink rounded-full px-3 py-1.5 outline-none font-body">
            <option value="Motolani">I am Motolani</option>
            <option value="Zusi">I am Zusi</option>
        </select>
    </header>

    <!-- Scrollable Content Area -->
    <main class="flex-1 overflow-y-auto px-5 pb-28 z-10 relative" id="main-content">

        <!-- ================= TAB 1: HOME ================= -->
        <div id="view-home" class="tab-view block space-y-5">
            <!-- Choose Again -->
            <section class="glass p-7 rounded-[28px] text-center mt-1">
                <p class="font-display italic text-lg text-dusk-ink/70 mb-4">Today</p>
                <button id="choose-btn" class="breathe-btn text-white w-full py-4 rounded-2xl font-display italic text-lg tracking-wide active:scale-95 transition-transform">
                    I choose you today
                </button>
                <div id="status-area" class="mt-5 hidden flex-col items-center chosen-heart">
                    <p class="text-dusk-rose text-base font-display italic mb-1">love, chosen ❤</p>
                    <p id="last-clicked-time" class="text-[11px] text-dusk-ink/50 font-body tracking-wide"></p>
                </div>
            </section>

            <!-- Quick Voice Capsule -->
            <section class="glass p-6 rounded-[28px]">
                <p class="font-display italic text-lg text-dusk-ink/80 mb-4">Voice capsule</p>
                <button class="record-btn w-full border-2 border-dashed border-dusk-plum/25 py-9 rounded-2xl flex flex-col items-center justify-center text-dusk-ink/50 transition-colors touch-none" data-type="capsule">
                    <svg class="w-7 h-7 mb-2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                    <span class="pointer-events-none text-sm status-text font-body">Hold to record for Zusi</span>
                </button>
            </section>
        </div>

        <!-- ================= TAB 2: FEED ================= -->
        <div id="view-feed" class="tab-view hidden">
            <p class="font-display italic text-xl text-dusk-mist mb-4 mt-1 drop-shadow-sm">Our timeline</p>
            <div id="voice-feed" class="space-y-3 empty:hidden pb-10"></div>
        </div>

        <!-- ================= TAB 3: SHARED ================= -->
        <div id="view-shared" class="tab-view hidden space-y-5 mt-1">

            <!-- Appreciation Jar -->
            <section class="glass p-5 rounded-[26px]">
                <p class="font-display italic text-lg text-dusk-ink/80 mb-3">Appreciation jar</p>
                <textarea id="appreciation-text" placeholder="Type something nice..." class="w-full text-sm p-3 bg-white/40 border border-white/60 rounded-xl mb-3 focus:outline-none focus:border-dusk-gold resize-none h-20 font-body text-dusk-ink placeholder:text-dusk-ink/40"></textarea>
                <div class="flex gap-2">
                    <button class="bg-dusk-ink/90 text-white px-4 py-3 rounded-xl text-sm font-medium flex-1 active:scale-95 transition-transform font-body" onclick="sendTextNote('appreciation')">Save text</button>
                    <button class="record-btn bg-white/40 border border-white/60 px-4 py-3 rounded-xl flex-1 text-sm text-dusk-ink/70 touch-none flex justify-center items-center gap-2 font-body" data-type="appreciation">
                        <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                        <span class="pointer-events-none status-text">Hold (voice)</span>
                    </button>
                </div>
            </section>

            <!-- Prayer Wall -->
            <section class="glass p-5 rounded-[26px]">
                <p class="font-display italic text-lg text-dusk-ink/80 mb-3">Prayer wall</p>
                <textarea id="prayer-text" placeholder="Add a prayer request..." class="w-full text-sm p-3 bg-white/40 border border-white/60 rounded-xl mb-3 focus:outline-none focus:border-dusk-gold resize-none h-20 font-body text-dusk-ink placeholder:text-dusk-ink/40"></textarea>
                <div class="flex gap-2">
                    <button class="bg-dusk-ink/90 text-white px-4 py-3 rounded-xl text-sm font-medium flex-1 active:scale-95 transition-transform font-body" onclick="sendTextNote('prayer')">Save text</button>
                    <button class="record-btn bg-white/40 border border-white/60 px-4 py-3 rounded-xl flex-1 text-sm text-dusk-ink/70 touch-none flex justify-center items-center gap-2 font-body" data-type="prayer">
                        <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                        <span class="pointer-events-none status-text">Hold (voice)</span>
                    </button>
                </div>
            </section>
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="absolute bottom-5 w-[calc(100%-2.5rem)] max-w-md left-1/2 -translate-x-1/2 nav-pill px-6 py-3.5 flex justify-between items-center text-dusk-ink/40 rounded-full z-20 font-body">
        <button onclick="switchTab('home')" id="tab-home" class="nav-btn active-nav flex flex-col items-center gap-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-medium">Home</span>
            <span class="nav-dot"></span>
        </button>
        <button onclick="switchTab('feed')" id="tab-feed" class="nav-btn flex flex-col items-center gap-1 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            <span class="text-[10px] font-medium">Timeline</span>
            <span class="nav-dot"></span>
        </button>
        <button onclick="switchTab('shared')" id="tab-shared" class="nav-btn flex flex-col items-center gap-1 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
            <span class="text-[10px] font-medium">Shared</span>
            <span class="nav-dot"></span>
        </button>
    </nav>

    <!-- Generate scattered stars -->
    <script>
        (function seedStars() {
            const field = document.getElementById('star-field');
            const count = 46;
            for (let i = 0; i < count; i++) {
                const s = document.createElement('span');
                const size = Math.random() * 2 + 1;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 55 + '%';
                s.style.animationDelay = (Math.random() * 4) + 's';
                s.style.animationDuration = (3 + Math.random() * 3) + 's';
                field.appendChild(s);
            }
        })();
    </script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, limit, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        // Your exact Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDRB-cRm-iX6nXP_5-hF5ACelpqtvx-Bgo",
            authDomain: "project-us-15aa0.firebaseapp.com",
            projectId: "project-us-15aa0",
            storageBucket: "project-us-15aa0.firebasestorage.app",
            messagingSenderId: "77217285858",
            appId: "1:77217285858:web:428597d6ace8c2e55640bb",
            measurementId: "G-YRE7RWQ48Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // --- TAB NAVIGATION ---
        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active-nav');
                btn.classList.add('text-dusk-ink/40');
            });
            document.getElementById(`tab-${tabId}`).classList.remove('text-dusk-ink/40');
            document.getElementById(`tab-${tabId}`).classList.add('active-nav');
        };

        // --- IDENTITY MANAGEMENT ---
        const identitySelect = document.getElementById('user-identity');
        let currentUser = localStorage.getItem('our_space_identity') || 'Motolani';
        identitySelect.value = currentUser;

        const greetingEl = document.getElementById('greeting');
        const dreamyGreetings = ['A quiet place, just for us', 'Still here, still choosing you', 'Softly, always yours'];

        const updateIdentity = () => {
            currentUser = identitySelect.value;
            localStorage.setItem('our_space_identity', currentUser);
            const otherPerson = currentUser === 'Motolani' ? 'Zusi' : 'Motolani';
            const capsuleText = document.querySelector('#view-home .status-text');
            if (capsuleText) capsuleText.innerText = `Hold to record for ${otherPerson}`;
            if (greetingEl) greetingEl.innerText = dreamyGreetings[Math.floor(Math.random() * dreamyGreetings.length)];
        };

        identitySelect.addEventListener('change', updateIdentity);
        updateIdentity();

        // --- FEATURE: TEXT NOTES (PRAYER/APPRECIATION) ---
        window.sendTextNote = async (type) => {
            const input = document.getElementById(`${type}-text`);
            if (!input.value.trim()) return;

            const textContent = input.value;
            input.value = 'Saving...';
            input.disabled = true;

            try {
                await addDoc(collection(db, "voice_notes"), {
                    format: 'text',
                    content: textContent,
                    sender: currentUser,
                    type: type,
                    timestamp: serverTimestamp()
                });
                input.value = '';
                switchTab('feed');
            } catch (error) {
                console.error("Text save failed:", error);
                alert("Failed to save. Check internet or Firebase rules.");
                input.value = textContent;
            }
            input.disabled = false;
        };

        // --- FEATURE 1: CHOOSE AGAIN ---
        const chooseBtn = document.getElementById('choose-btn');
        const statusArea = document.getElementById('status-area');
        const timeDisplay = document.getElementById('last-clicked-time');

        chooseBtn.addEventListener('click', async () => {
            chooseBtn.disabled = true;
            chooseBtn.innerText = "Syncing...";
            try {
                await addDoc(collection(db, "choose_events"), { timestamp: serverTimestamp(), user: currentUser });
            } catch (error) {
                console.error(error);
                chooseBtn.innerText = "Error - Try again";
                chooseBtn.disabled = false;
            }
        });

        const qChoose = query(collection(db, "choose_events"), orderBy("timestamp", "desc"), limit(1));
        onSnapshot(qChoose, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    const date = data.timestamp ? data.timestamp.toDate() : new Date();
                    chooseBtn.classList.add('hidden');
                    statusArea.classList.remove('hidden');
                    statusArea.classList.add('flex');
                    timeDisplay.innerText = `Last pressed: ${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}, ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                }
            });
        });

        // --- FEATURE 2: UNIVERSAL VOICE RECORDING (VIA CLOUD STORAGE) ---
        const recordBtns = document.querySelectorAll('.record-btn');
        let mediaRecorder;
        let audioChunks = [];
        let stream;

        recordBtns.forEach(btn => {
            btn.addEventListener('pointerdown', async (e) => {
                e.preventDefault();
                const type = btn.getAttribute('data-type');
                const statusText = btn.querySelector('.status-text');

                try {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);

                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        audioChunks = [];
                        stream.getTracks().forEach(track => track.stop());

                        if (statusText) statusText.innerText = "Uploading to Storage...";
                        btn.classList.remove('is-recording');

                        try {
                            // 1. Upload the raw audio file to Cloud Storage
                            const fileName = `voice_notes/${Date.now()}_${currentUser}.webm`;
                            const storageRef = ref(storage, fileName);
                            await uploadBytes(storageRef, audioBlob);

                            // 2. Get the permanent URL for that file
                            const downloadUrl = await getDownloadURL(storageRef);

                            // 3. Save that URL to Firestore so the feed can display it
                            await addDoc(collection(db, "voice_notes"), {
                                format: 'audio',
                                url: downloadUrl,
                                sender: currentUser,
                                type: type,
                                playedBy: [],
                                timestamp: serverTimestamp()
                            });

                            if (statusText) statusText.innerText = "Sent";
                            setTimeout(() => {
                                if (statusText) updateIdentity();
                                if (type !== 'capsule') switchTab('feed');
                            }, 1500);
                        } catch (error) {
                            console.error("Upload failed:", error);
                            alert(`Upload failed: ${error.message}`);
                            if (statusText) statusText.innerText = "Upload failed";
                        }
                    };

                    mediaRecorder.start();
                    btn.classList.add('is-recording');
                    if (statusText) statusText.innerText = "Recording... release to send";

                } catch (err) {
                    alert("Microphone access needed.");
                }
            });

            const stopRecording = () => {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
            };

            btn.addEventListener('pointerup', stopRecording);
            btn.addEventListener('pointercancel', stopRecording);
            btn.addEventListener('pointerleave', stopRecording);
        });

        // --- FEATURE 3: UNIFIED TIMELINE (FEED) ---
        const feed = document.getElementById('voice-feed');
        // Load up to 50 recent items
        const qTimeline = query(collection(db, "voice_notes"), orderBy("timestamp", "desc"), limit(50));

        onSnapshot(qTimeline, (snapshot) => {
            feed.innerHTML = '';
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const docId = docSnap.id;
                const isMine = data.sender === currentUser;
                const hasBeenPlayed = data.playedBy && data.playedBy.length > 0;

                const date = data.timestamp ? data.timestamp.toDate() : new Date();
                const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                let statusHtml = '';
                if (isMine && data.format === 'audio') {
                    statusHtml = hasBeenPlayed
                        ? `<span class="text-dusk-sage text-xs font-bold tracking-tighter ml-1">seen</span>`
                        : `<span class="text-dusk-ink/40 text-xs ml-1">sent</span>`;
                }

                let contentHtml = '';
                if (data.format === 'text') {
                    contentHtml = `<div class="mt-2 text-sm text-dusk-ink font-body bg-white/50 p-3 rounded-xl border border-white/60">${data.content}</div>`;
                } else {
                    contentHtml = `<audio src="${data.url}" controls class="w-full mt-2" id="audio-${docId}"></audio>`;
                }

                const itemHtml = `
                    <div class="glass rounded-2xl p-4 mb-3">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[11px] font-semibold text-dusk-ink/70 uppercase tracking-wider font-body">${data.type}</span>
                            <span class="text-[10px] text-dusk-ink/50 bg-white/50 px-2 py-1 rounded-md border border-white/60 font-body">
                                ${dateStr} • ${timeStr} ${statusHtml}
                            </span>
                        </div>
                        <div class="text-xs text-dusk-ink/50 font-medium mb-1 font-body">${data.sender}</div>
                        ${contentHtml}
                    </div>
                `;
                feed.insertAdjacentHTML('beforeend', itemHtml);

                if (data.format === 'audio') {
                    const audioElement = document.getElementById(`audio-${docId}`);
                    if (audioElement && !isMine) {
                        audioElement.addEventListener('play', async () => {
                            if (!data.playedBy.includes(currentUser)) {
                                await updateDoc(doc(db, "voice_notes", docId), {
                                    playedBy: arrayUnion(currentUser)
                                });
                            }
                        }, { once: true });
                    }
                }
            });
        });
    </script>
</body>
</html>
