<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Space</title>

    <!-- Web App Manifest & Mobile Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#F4ECDA">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=Karla:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        note: {
                            paper: 'rgb(var(--note-paper) / <alpha-value>)',
                            paperDeep: 'rgb(var(--note-paperDeep) / <alpha-value>)',
                            card: 'rgb(var(--note-card) / <alpha-value>)',
                            ink: 'rgb(var(--note-ink) / <alpha-value>)',
                            inkSoft: 'rgb(var(--note-inkSoft) / <alpha-value>)',
                            rust: 'rgb(var(--note-rust) / <alpha-value>)',
                            sage: 'rgb(var(--note-sage) / <alpha-value>)',
                            gold: 'rgb(var(--note-gold) / <alpha-value>)'
                        }
                    },
                    fontFamily: {
                        display: ['"Fraunces"', 'serif'],
                        body: ['"Karla"', 'sans-serif'],
                        mono: ['"Space Mono"', 'monospace']
                    }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; }

        :root {
            --note-paper: 244 236 218;
            --note-paperDeep: 231 219 189;
            --note-card: 251 247 236;
            --note-ink: 46 42 34;
            --note-inkSoft: 110 98 82;
            --note-rust: 162 62 44;
            --note-sage: 92 122 94;
            --note-gold: 185 134 47;
            --c-rust: rgb(var(--note-rust));
            --c-sage: rgb(var(--note-sage));
            --c-gold: rgb(var(--note-gold));
            --note-sheen: 0.5;
            color-scheme: light;
        }

        html.dark {
            --note-paper: 25 21 15;
            --note-paperDeep: 34 28 20;
            --note-card: 41 34 25;
            --note-ink: 236 227 205;
            --note-inkSoft: 173 161 137;
            --note-rust: 224 110 84;
            --note-sage: 143 176 143;
            --note-gold: 222 178 96;
            --note-sheen: 0.05;
            color-scheme: dark;
        }

        html, body {
            font-family: 'Karla', sans-serif;
            height: 100%;
            background: rgb(var(--note-paper));
            transition: background 0.25s ease;
        }

        .font-display { font-family: 'Fraunces', serif; }
        .font-mono { font-family: 'Space Mono', monospace; }

        /* ---------- Paper grain (subtle, single texture pass) ---------- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.05;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        }

        /* ---------- Note cards (replace uniform glass panels) ---------- */
        .note-card {
            position: relative;
            background: rgb(var(--note-card));
            border: 1px solid rgb(var(--note-ink) / 0.10);
            border-radius: 14px;
            padding: 26px 22px 22px;
            box-shadow: 0 10px 24px -12px rgb(var(--note-ink) / 0.28), 0 1px 0 rgb(255 255 255 / var(--note-sheen)) inset;
            transform: rotate(var(--rot, 0deg));
            animation: settle 0.5s ease-out;
        }
        @keyframes settle {
            0% { opacity: 0; transform: rotate(var(--rot, 0deg)) translateY(8px); }
            100% { opacity: 1; transform: rotate(var(--rot, 0deg)) translateY(0); }
        }

        /* washi-tape accent, color set per-card via --tape */
        .washi {
            position: absolute;
            top: -10px;
            left: 50%;
            width: 56px;
            height: 20px;
            transform: translateX(-50%) rotate(-3deg);
            background-color: color-mix(in srgb, var(--tape, #A23E2C) 78%, white);
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.35) 0 4px, transparent 4px 9px);
            opacity: 0.9;
            border-radius: 2px;
            box-shadow: 0 3px 5px -2px rgb(var(--note-ink) / 0.35);
        }

        /* ---------- Wax seal press button ---------- */
        .seal-btn {
            position: relative;
            width: 108px;
            height: 108px;
            border-radius: 50%;
            background: radial-gradient(circle at 32% 28%, #C1543D, #A23E2C 55%, #7E2E20 100%);
            box-shadow: 0 10px 20px -6px rgb(var(--note-rust) / 0.55), inset 0 2px 4px rgba(255,255,255,0.25), inset 0 -6px 10px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .seal-btn:active {
            transform: scale(0.94) translateY(2px);
            box-shadow: 0 4px 10px -4px rgb(var(--note-rust) / 0.5), inset 0 2px 4px rgba(255,255,255,0.2), inset 0 -3px 6px rgba(0,0,0,0.3);
        }
        .seal-rings {
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.28);
            box-shadow: 0 0 0 6px rgba(255,255,255,0.08), 0 0 0 12px rgba(255,255,255,0.05);
        }
        .seal-mono {
            color: #F6E3D3;
            font-size: 15px;
            letter-spacing: 0.02em;
            text-shadow: 0 1px 1px rgba(0,0,0,0.35);
        }

        /* postmark stamp shown once chosen */
        .postmark {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            color: var(--c-rust);
            border: 2px solid var(--c-rust);
            border-radius: 999px;
            padding: 5px 16px;
            transform: rotate(-4deg);
            opacity: 0.9;
        }
        .chosen-heart { animation: rise-fade 0.5s ease-out; }
        @keyframes rise-fade {
            0% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ---------- Record (voice) buttons ---------- */
        .capsule-btn {
            width: 100%;
            border: 2px dashed rgb(var(--note-ink) / 0.22);
            border-radius: 12px;
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgb(var(--note-ink) / 0.55);
            touch-action: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        .record-btn.is-recording {
            border-color: var(--c-rust);
            background: rgb(var(--note-rust) / 0.08);
            box-shadow: 0 0 0 6px rgb(var(--note-rust) / 0.1);
        }
        .voice-mini-btn.is-recording {
            border-color: var(--c-rust);
            background: rgb(var(--note-rust) / 0.1);
        }

        textarea::placeholder { color: rgb(var(--note-ink) / 0.35); }

        /* ---------- Feed postcards ---------- */
        .note-postcard {
            background: rgb(var(--note-card));
            border: 1px solid rgb(var(--note-ink) / 0.10);
            border-left: 4px solid var(--c-rust);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 12px;
            box-shadow: 0 6px 14px -10px rgb(var(--note-ink) / 0.3);
            animation: settle 0.35s ease-out;
        }
        .note-postcard[data-entry="prayer"] { border-left-color: var(--c-sage); }
        .note-postcard[data-entry="appreciation"] { border-left-color: var(--c-gold); }
        .note-postcard[data-entry="capsule"] { border-left-color: var(--c-rust); }

        .stamp-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block;
            background: var(--c-rust);
        }
        .note-postcard[data-entry="prayer"] .stamp-dot { background: var(--c-sage); }
        .note-postcard[data-entry="appreciation"] .stamp-dot { background: var(--c-gold); }
        .note-postcard[data-entry="capsule"] .stamp-dot { background: var(--c-rust); }

        /* ---------- Ticket-stub nav ---------- */
        .stub-nav {
            background: rgb(var(--note-card));
            border-top: 1px dashed rgb(var(--note-ink) / 0.25);
            box-shadow: 0 -8px 20px -14px rgb(var(--note-ink) / 0.35);
        }
        .nav-btn { color: rgb(var(--note-ink) / 0.4); }
        .nav-btn.active-nav { color: rgb(var(--note-ink)); }
        .nav-underline {
            width: 0%;
            height: 2px;
            background: var(--c-rust);
            transition: width 0.2s ease;
            margin-top: 4px;
        }
        .nav-btn.active-nav .nav-underline { width: 60%; }

        ::-webkit-scrollbar { width: 0px; }

        @media (prefers-reduced-motion: reduce) {
            .note-card, .note-postcard, .chosen-heart { animation: none !important; }
        }
    </style>
</head>
<body class="text-note-ink antialiased selection:bg-note-rust selection:text-white select-none h-screen flex flex-col overflow-hidden relative bg-note-paper">

    <!-- Top Bar -->
    <header class="pt-6 pb-4 px-5 z-10 shrink-0 relative border-b border-note-ink/10">
        <div class="flex justify-between items-end">
            <div>
                <p class="font-display italic text-[26px] leading-none text-note-ink">Our Space</p>
                <p class="text-[10px] text-note-inkSoft mt-1.5 font-mono uppercase tracking-[0.15em]" id="greeting">Sealed with us</p>
            </div>
            <div class="flex items-center gap-2">
                <button id="theme-toggle" aria-label="Toggle dark mode" class="w-8 h-8 rounded-full bg-note-paperDeep/60 border border-note-ink/15 flex items-center justify-center text-note-ink/70 shrink-0">
                    <svg id="icon-moon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>
                    <svg id="icon-sun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M12 3v1.5M12 19.5V21M4.22 4.22l1.06 1.06M18.72 18.72l1.06 1.06M3 12h1.5M19.5 12H21M4.22 19.78l1.06-1.06M18.72 5.28l1.06-1.06M12 7.5a4.5 4.5 0 100 9 4.5 4.5 0 000-9z"></path></svg>
                </button>
                <select id="user-identity" class="text-[11px] font-mono uppercase tracking-wide text-note-ink bg-note-paperDeep/60 border border-note-ink/15 rounded-full px-3 py-1.5 outline-none">
                    <option value="Motolani">I am Motolani</option>
                    <option value="Zusi">I am Zusi</option>
                </select>
            </div>
        </div>
    </header>

    <!-- Scrollable Content Area -->
    <main class="flex-1 overflow-y-auto px-5 pt-5 pb-28 z-10 relative" id="main-content">

        <!-- ================= TAB 1: HOME ================= -->
        <div id="view-home" class="tab-view block space-y-6">

            <!-- Choose Again -->
            <section class="note-card text-center" style="--rot:-0.6deg; --tape:#A23E2C">
                <span class="washi" aria-hidden="true"></span>
                <p class="font-display italic text-[15px] text-note-inkSoft mb-5">Today</p>

                <div class="flex flex-col items-center">
                    <button id="choose-btn" class="seal-btn" aria-label="Press to choose each other today">
                        <span class="seal-rings"></span>
                        <span class="seal-mono font-display italic">M &#9825; Z</span>
                    </button>
                    <p class="mt-4 text-[13px] font-body text-note-inkSoft max-w-[220px] leading-snug">Press the seal to choose each other, again, today</p>
                </div>

                <div id="status-area" class="mt-5 hidden flex-col items-center chosen-heart">
                    <span class="postmark">SEALED</span>
                    <p id="last-clicked-time" class="text-[11px] text-note-inkSoft font-mono tracking-wide mt-3"></p>
                </div>
            </section>

            <!-- Quick Voice Capsule -->
            <section class="note-card" style="--rot:0.5deg; --tape:#5C7A5E">
                <span class="washi" aria-hidden="true"></span>
                <p class="font-display italic text-[15px] text-note-ink mb-4">Voice capsule</p>
                <button class="record-btn capsule-btn" data-type="capsule">
                    <svg class="w-6 h-6 mb-2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                    <span class="pointer-events-none status-text font-mono text-[11px] uppercase tracking-wide">Hold to record for Zusi</span>
                </button>
            </section>
        </div>

        <!-- ================= TAB 2: FEED ================= -->
        <div id="view-feed" class="tab-view hidden">
            <p class="font-display italic text-[20px] text-note-ink mb-4">Our timeline</p>
            <div id="voice-feed" class="empty:hidden pb-10"></div>
        </div>

        <!-- ================= TAB 3: SHARED ================= -->
        <div id="view-shared" class="tab-view hidden space-y-6">

            <!-- Appreciation Jar -->
            <section class="note-card" style="--rot:-0.4deg; --tape:#B9862F">
                <span class="washi" aria-hidden="true"></span>
                <p class="font-display italic text-[15px] text-note-ink mb-3">Appreciation jar</p>
                <textarea id="appreciation-text" placeholder="Type something nice..." class="w-full text-sm p-3 bg-note-paperDeep/40 border border-note-ink/15 rounded-[10px] mb-3 focus:outline-none focus:border-note-gold resize-none h-20 font-body text-note-ink placeholder:text-note-ink/40"></textarea>
                <div class="flex gap-2">
                    <button class="bg-note-ink text-note-paper px-4 py-3 rounded-[10px] text-sm font-medium flex-1 active:scale-95 transition-transform font-body" onclick="sendTextNote('appreciation')">Save text</button>
                    <button class="record-btn voice-mini-btn bg-note-paperDeep/40 border border-note-ink/15 px-4 py-3 rounded-[10px] flex-1 text-sm text-note-ink/70 flex justify-center items-center gap-2 font-body" data-type="appreciation">
                        <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                        <span class="pointer-events-none status-text">Hold (voice)</span>
                    </button>
                </div>
            </section>

            <!-- Prayer Wall -->
            <section class="note-card" style="--rot:0.4deg; --tape:#5C7A5E">
                <span class="washi" aria-hidden="true"></span>
                <p class="font-display italic text-[15px] text-note-ink mb-3">Prayer wall</p>
                <textarea id="prayer-text" placeholder="Add a prayer request..." class="w-full text-sm p-3 bg-note-paperDeep/40 border border-note-ink/15 rounded-[10px] mb-3 focus:outline-none focus:border-note-sage resize-none h-20 font-body text-note-ink placeholder:text-note-ink/40"></textarea>
                <div class="flex gap-2">
                    <button class="bg-note-ink text-note-paper px-4 py-3 rounded-[10px] text-sm font-medium flex-1 active:scale-95 transition-transform font-body" onclick="sendTextNote('prayer')">Save text</button>
                    <button class="record-btn voice-mini-btn bg-note-paperDeep/40 border border-note-ink/15 px-4 py-3 rounded-[10px] flex-1 text-sm text-note-ink/70 flex justify-center items-center gap-2 font-body" data-type="prayer">
                        <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                        <span class="pointer-events-none status-text">Hold (voice)</span>
                    </button>
                </div>
            </section>
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="absolute bottom-0 w-full stub-nav px-8 py-3.5 flex justify-between items-center z-20 font-body">
        <button onclick="switchTab('home')" id="tab-home" class="nav-btn active-nav flex flex-col items-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-mono uppercase tracking-wide mt-1">Home</span>
            <span class="nav-underline"></span>
        </button>
        <button onclick="switchTab('feed')" id="tab-feed" class="nav-btn flex flex-col items-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            <span class="text-[10px] font-mono uppercase tracking-wide mt-1">Timeline</span>
            <span class="nav-underline"></span>
        </button>
        <button onclick="switchTab('shared')" id="tab-shared" class="nav-btn flex flex-col items-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
            <span class="text-[10px] font-mono uppercase tracking-wide mt-1">Shared</span>
            <span class="nav-underline"></span>
        </button>
    </nav>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, limit, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        // Your exact Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDRB-cRm-iX6nXP_5-hF5ACelpqtvx-Bgo",
            authDomain: "project-us-15aa0.firebaseapp.com",
            projectId: "project-us-15aa0",
            storageBucket: "project-us-15aa0.firebasestorage.app",
            messagingSenderId: "77217285858",
            appId: "1:77217285858:web:428597d6ace8c2e55640bb",
            measurementId: "G-YRE7RWQ48Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // --- TAB NAVIGATION ---
        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active-nav');
            });
            document.getElementById(`tab-${tabId}`).classList.add('active-nav');
        };

        // --- THEME (LIGHT / DARK) ---
        const rootEl = document.documentElement;
        const themeToggle = document.getElementById('theme-toggle');
        const iconMoon = document.getElementById('icon-moon');
        const iconSun = document.getElementById('icon-sun');
        const themeMeta = document.querySelector('meta[name="theme-color"]');

        const applyTheme = (mode) => {
            rootEl.classList.toggle('dark', mode === 'dark');
            iconMoon.classList.toggle('hidden', mode === 'dark');
            iconSun.classList.toggle('hidden', mode !== 'dark');
            localStorage.setItem('our_space_theme', mode);
            if (themeMeta) {
                const rgb = getComputedStyle(rootEl).getPropertyValue('--note-paper').trim().split(/\s+/);
                if (rgb.length === 3) themeMeta.setAttribute('content', `rgb(${rgb.join(',')})`);
            }
        };

        const storedTheme = localStorage.getItem('our_space_theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(storedTheme || (prefersDark ? 'dark' : 'light'));

        themeToggle.addEventListener('click', () => {
            applyTheme(rootEl.classList.contains('dark') ? 'light' : 'dark');
        });

        // --- IDENTITY MANAGEMENT ---
        const identitySelect = document.getElementById('user-identity');
        let currentUser = localStorage.getItem('our_space_identity') || 'Motolani';
        identitySelect.value = currentUser;

        const greetingEl = document.getElementById('greeting');
        const dreamyGreetings = ['Sealed with us', 'Still choosing you', 'Kept safe here'];

        const updateIdentity = () => {
            currentUser = identitySelect.value;
            localStorage.setItem('our_space_identity', currentUser);
            const otherPerson = currentUser === 'Motolani' ? 'Zusi' : 'Motolani';
            const capsuleText = document.querySelector('#view-home .status-text');
            if (capsuleText) capsuleText.innerText = `Hold to record for ${otherPerson}`;
            if (greetingEl) greetingEl.innerText = dreamyGreetings[Math.floor(Math.random() * dreamyGreetings.length)];
        };

        identitySelect.addEventListener('change', updateIdentity);
        updateIdentity();

        // --- FEATURE: TEXT NOTES (PRAYER/APPRECIATION) ---
        window.sendTextNote = async (type) => {
            const input = document.getElementById(`${type}-text`);
            if (!input.value.trim()) return;

            const textContent = input.value;
            input.value = 'Saving...';
            input.disabled = true;

            try {
                await addDoc(collection(db, "voice_notes"), {
                    format: 'text',
                    content: textContent,
                    sender: currentUser,
                    type: type,
                    timestamp: serverTimestamp()
                });
                input.value = '';
                switchTab('feed');
            } catch (error) {
                console.error("Text save failed:", error);
                alert("Failed to save. Check internet or Firebase rules.");
                input.value = textContent;
            }
            input.disabled = false;
        };

        // --- FEATURE 1: CHOOSE AGAIN ---
        const chooseBtn = document.getElementById('choose-btn');
        const statusArea = document.getElementById('status-area');
        const timeDisplay = document.getElementById('last-clicked-time');

        chooseBtn.addEventListener('click', async () => {
            chooseBtn.disabled = true;
            chooseBtn.innerText = "...";
            try {
                await addDoc(collection(db, "choose_events"), { timestamp: serverTimestamp(), user: currentUser });
            } catch (error) {
                console.error(error);
                chooseBtn.innerText = "retry";
                chooseBtn.disabled = false;
            }
        });

        const qChoose = query(collection(db, "choose_events"), orderBy("timestamp", "desc"), limit(1));
        onSnapshot(qChoose, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    const date = data.timestamp ? data.timestamp.toDate() : new Date();
                    chooseBtn.classList.add('hidden');
                    statusArea.classList.remove('hidden');
                    statusArea.classList.add('flex');
                    timeDisplay.innerText = `Last sealed: ${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}, ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                }
            });
        });

        // --- FEATURE 2: UNIVERSAL VOICE RECORDING (VIA CLOUD STORAGE) ---
        const recordBtns = document.querySelectorAll('.record-btn');
        let mediaRecorder;
        let audioChunks = [];
        let stream;

        recordBtns.forEach(btn => {
            btn.addEventListener('pointerdown', async (e) => {
                e.preventDefault();
                const type = btn.getAttribute('data-type');
                const statusText = btn.querySelector('.status-text');

                try {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);

                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        audioChunks = [];
                        stream.getTracks().forEach(track => track.stop());

                        if (statusText) statusText.innerText = "Uploading...";
                        btn.classList.remove('is-recording');

                        try {
                            // 1. Upload the raw audio file to Cloud Storage
                            const fileName = `voice_notes/${Date.now()}_${currentUser}.webm`;
                            const storageRef = ref(storage, fileName);
                            await uploadBytes(storageRef, audioBlob);

                            // 2. Get the permanent URL for that file
                            const downloadUrl = await getDownloadURL(storageRef);

                            // 3. Save that URL to Firestore so the feed can display it
                            await addDoc(collection(db, "voice_notes"), {
                                format: 'audio',
                                url: downloadUrl,
                                sender: currentUser,
                                type: type,
                                playedBy: [],
                                timestamp: serverTimestamp()
                            });

                            if (statusText) statusText.innerText = "Sent";
                            setTimeout(() => {
                                if (statusText) updateIdentity();
                                if (type !== 'capsule') switchTab('feed');
                            }, 1500);
                        } catch (error) {
                            console.error("Upload failed:", error);
                            alert(`Upload failed: ${error.message}`);
                            if (statusText) statusText.innerText = "Upload failed";
                        }
                    };

                    mediaRecorder.start();
                    btn.classList.add('is-recording');
                    if (statusText) statusText.innerText = "Recording... release to send";

                } catch (err) {
                    alert("Microphone access needed.");
                }
            });

            const stopRecording = () => {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
            };

            btn.addEventListener('pointerup', stopRecording);
            btn.addEventListener('pointercancel', stopRecording);
            btn.addEventListener('pointerleave', stopRecording);
        });

        // --- FEATURE 3: UNIFIED TIMELINE (FEED) ---
        const feed = document.getElementById('voice-feed');
        // Load up to 50 recent items
        const qTimeline = query(collection(db, "voice_notes"), orderBy("timestamp", "desc"), limit(50));

        onSnapshot(qTimeline, (snapshot) => {
            feed.innerHTML = '';
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const docId = docSnap.id;
                const isMine = data.sender === currentUser;
                const hasBeenPlayed = data.playedBy && data.playedBy.length > 0;

                const date = data.timestamp ? data.timestamp.toDate() : new Date();
                const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                let statusHtml = '';
                if (isMine && data.format === 'audio') {
                    statusHtml = hasBeenPlayed
                        ? `<span class="text-note-sage font-bold ml-1">seen</span>`
                        : `<span class="text-note-inkSoft/60 ml-1">sent</span>`;
                }

                let contentHtml = '';
                if (data.format === 'text') {
                    contentHtml = `<div class="mt-2 text-sm text-note-ink font-body bg-note-paperDeep/40 p-3 rounded-[8px] border border-note-ink/10">${data.content}</div>`;
                } else {
                    contentHtml = `<audio src="${data.url}" controls class="w-full mt-2" id="audio-${docId}"></audio>`;
                }

                const itemHtml = `
                    <div class="note-postcard" data-entry="${data.type}">
                        <div class="flex justify-between items-center mb-1.5">
                            <span class="flex items-center gap-1.5">
                                <span class="stamp-dot" aria-hidden="true"></span>
                                <span class="text-[10px] font-mono uppercase tracking-wide text-note-ink/80">${data.type}</span>
                            </span>
                            <span class="text-[10px] font-mono text-note-inkSoft">${dateStr} &middot; ${timeStr} ${statusHtml}</span>
                        </div>
                        <div class="text-[10px] font-mono uppercase tracking-wide text-note-inkSoft/80">${data.sender}</div>
                        ${contentHtml}
                    </div>
                `;
                feed.insertAdjacentHTML('beforeend', itemHtml);

                if (data.format === 'audio') {
                    const audioElement = document.getElementById(`audio-${docId}`);
                    if (audioElement && !isMine) {
                        audioElement.addEventListener('play', async () => {
                            if (!data.playedBy.includes(currentUser)) {
                                await updateDoc(doc(db, "voice_notes", docId), {
                                    playedBy: arrayUnion(currentUser)
                                });
                            }
                        }, { once: true });
                    }
                }
            });
        });
    </script>
</body>
</html>
