<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: {
                            50: '#FAF9F6',
                            100: '#F5F5F0',
                            800: '#2C2A29',
                            red: '#8B3A3A',
                            green: '#4A7C59'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-warm-50 text-warm-800 font-sans antialiased pb-20 selection:bg-warm-red selection:text-white select-none">
    
    <!-- Identity Switch (No Passwords) -->
    <div class="absolute top-4 right-4">
        <select id="user-identity" class="bg-white border border-warm-100 text-xs text-warm-800 rounded-full px-3 py-1 outline-none shadow-sm">
            <option value="Motolani">I am Motolani</option>
            <option value="Zusi">I am Zusi</option>
        </select>
    </div>

    <main class="max-w-md mx-auto p-6 mt-8">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-serif tracking-wide text-warm-800">Our Space</h1>
            <p class="text-sm text-gray-500 mt-1" id="greeting">Welcome</p>
        </header>

        <!-- 1. Choose Again -->
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-warm-100 text-center mb-6">
            <h2 class="text-lg font-medium mb-2">Today</h2>
            
            <button id="choose-btn" class="bg-warm-800 text-white w-full py-4 rounded-xl font-medium active:scale-95 transition-all">
                I choose you today
            </button>
            
            <div id="status-area" class="mt-4 hidden flex flex-col items-center">
                <p class="text-warm-red text-sm italic font-medium mb-1">❤️ Love chosen</p>
                <p id="last-clicked-time" class="text-xs text-gray-400"></p>
            </div>
        </section>

        <!-- 2. Voice Capsule -->
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-warm-100 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-medium">Voice Capsule</h2>
                <span class="text-xs bg-warm-100 px-2 py-1 rounded text-gray-600">Hold to record</span>
            </div>
            
            <button id="record-capsule" class="record-btn w-full border-2 border-dashed border-gray-300 py-6 rounded-xl flex flex-col items-center justify-center text-gray-400 transition-colors touch-none" data-type="capsule">
                <svg class="w-8 h-8 mb-2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                <span class="pointer-events-none text-sm status-text">Record for Zusi</span>
            </button>

            <!-- Feed for Voice Notes -->
            <div id="voice-feed" class="mt-4 space-y-3 empty:hidden">
                <!-- Audio elements populate here -->
            </div>
        </section>

        <!-- 3 & 4. Jars & Prayers (Voice First) -->
        <div class="grid grid-cols-2 gap-4">
            <!-- Appreciation Jar -->
            <section class="bg-white p-4 rounded-2xl shadow-sm border border-warm-100 text-center">
                <h2 class="font-medium mb-1 text-sm">Appreciation</h2>
                <button class="record-btn w-full mt-2 bg-warm-50 border border-warm-100 py-3 rounded-xl flex justify-center items-center text-gray-400 touch-none active:bg-warm-100" data-type="appreciation">
                    <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                </button>
            </section>

            <!-- Prayer Wall -->
            <section class="bg-white p-4 rounded-2xl shadow-sm border border-warm-100 text-center">
                <h2 class="font-medium mb-1 text-sm">Prayer Wall</h2>
                <button class="record-btn w-full mt-2 bg-warm-50 border border-warm-100 py-3 rounded-xl flex justify-center items-center text-gray-400 touch-none active:bg-warm-100" data-type="prayer">
                    <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                </button>
            </section>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, limit, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDRB-cRm-iX6nXP_5-hF5ACelpqtvx-Bgo",
            authDomain: "project-us-15aa0.firebaseapp.com",
            projectId: "project-us-15aa0",
            storageBucket: "project-us-15aa0.firebasestorage.app",
            messagingSenderId: "77217285858",
            appId: "1:77217285858:web:428597d6ace8c2e55640bb",
            measurementId: "G-YRE7RWQ48Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // --- IDENTITY MANAGEMENT ---
        const identitySelect = document.getElementById('user-identity');
        const greeting = document.getElementById('greeting');
        
        let currentUser = localStorage.getItem('our_space_identity') || 'Motolani';
        identitySelect.value = currentUser;
        
        const updateIdentity = () => {
            currentUser = identitySelect.value;
            localStorage.setItem('our_space_identity', currentUser);
            const otherPerson = currentUser === 'Motolani' ? 'Zusi' : 'Motolani';
            document.querySelector('#record-capsule .status-text').innerText = `Record for ${otherPerson}`;
        };
        
        identitySelect.addEventListener('change', updateIdentity);
        updateIdentity();

        // --- FEATURE 1: CHOOSE AGAIN (WITH DATE FORMATTING) ---
        const chooseBtn = document.getElementById('choose-btn');
        const statusArea = document.getElementById('status-area');
        const timeDisplay = document.getElementById('last-clicked-time');

        chooseBtn.addEventListener('click', async () => {
            chooseBtn.disabled = true;
            chooseBtn.innerText = "Syncing...";
            try {
                await addDoc(collection(db, "choose_events"), { timestamp: serverTimestamp(), user: currentUser });
            } catch (error) {
                console.error(error);
                chooseBtn.innerText = "Error - Try again";
                chooseBtn.disabled = false;
            }
        });

        const qChoose = query(collection(db, "choose_events"), orderBy("timestamp", "desc"), limit(1));
        onSnapshot(qChoose, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    const date = data.timestamp ? data.timestamp.toDate() : new Date();
                    
                    chooseBtn.classList.add('hidden');
                    statusArea.classList.remove('hidden');
                    
                    // Formatted to show Date and Time
                    const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    timeDisplay.innerText = `Last pressed: ${dateStr}, ${timeStr}`;
                }
            });
        });

        // --- FEATURE 2: UNIVERSAL VOICE RECORDING & STORAGE ---
        const recordBtns = document.querySelectorAll('.record-btn');
        let mediaRecorder;
        let audioChunks = [];
        let stream;
        let currentBtn;

        recordBtns.forEach(btn => {
            btn.addEventListener('pointerdown', async (e) => {
                e.preventDefault();
                currentBtn = btn;
                const type = btn.getAttribute('data-type');
                
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    
                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        audioChunks = [];
                        stream.getTracks().forEach(track => track.stop());
                        
                        // Uploading State
                        const statusText = btn.querySelector('.status-text');
                        const originalText = statusText ? statusText.innerText : '';
                        if(statusText) statusText.innerText = "Sending...";
                        btn.classList.replace('border-warm-red', 'border-gray-300');
                        btn.classList.replace('text-warm-red', 'text-gray-400');

                        try {
                            // Upload to Storage
                            const fileName = `voice_notes/${Date.now()}_${currentUser}.webm`;
                            const storageRef = ref(storage, fileName);
                            await uploadBytes(storageRef, audioBlob);
                            const downloadUrl = await getDownloadURL(storageRef);

                            // Save reference to Firestore
                            await addDoc(collection(db, "voice_notes"), {
                                url: downloadUrl,
                                sender: currentUser,
                                type: type,
                                playedBy: [],
                                timestamp: serverTimestamp()
                            });

                            if(statusText) statusText.innerText = "Sent! ✓";
                            setTimeout(() => { if(statusText) updateIdentity(); }, 2000);
                        } catch (error) {
                            console.error("Upload failed", error);
                            if(statusText) statusText.innerText = "Upload failed";
                        }
                    };

                    mediaRecorder.start();
                    btn.classList.replace('border-gray-300', 'border-warm-red');
                    btn.classList.replace('text-gray-400', 'text-warm-red');
                    const statusText = btn.querySelector('.status-text');
                    if(statusText) statusText.innerText = "Recording... Release to send";
                    
                } catch (err) {
                    alert("Microphone access needed.");
                }
            });

            const stopRecording = () => {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
            };

            btn.addEventListener('pointerup', stopRecording);
            btn.addEventListener('pointercancel', stopRecording);
            btn.addEventListener('pointerleave', stopRecording);
        });

        // --- FEATURE 3: VOICE FEED & READ RECEIPTS ---
        const feed = document.getElementById('voice-feed');
        const qVoice = query(collection(db, "voice_notes"), orderBy("timestamp", "desc"), limit(5));
        
        onSnapshot(qVoice, (snapshot) => {
            feed.innerHTML = ''; // Clear feed
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const docId = docSnap.id;
                const isMine = data.sender === currentUser;
                const hasBeenPlayed = data.playedBy && data.playedBy.length > 0;
                
                // Format timestamp
                const date = data.timestamp ? data.timestamp.toDate() : new Date();
                const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                // Read receipt logic
                let statusHtml = '';
                if (isMine) {
                    // Show double green checkmark if played, single grey if unplayed
                    statusHtml = hasBeenPlayed 
                        ? `<span class="text-warm-green text-xs font-bold tracking-tighter">✓✓</span>` 
                        : `<span class="text-gray-400 text-xs">✓</span>`;
                }

                const itemHtml = `
                    <div class="bg-warm-50 rounded-xl p-3 flex items-center justify-between border border-warm-100">
                        <div class="flex flex-col">
                            <span class="text-xs font-medium text-warm-800 capitalize">${data.type}</span>
                            <span class="text-[10px] text-gray-500">${data.sender} • ${timeStr} ${statusHtml}</span>
                        </div>
                        <audio src="${data.url}" controls class="h-8 w-48" id="audio-${docId}"></audio>
                    </div>
                `;
                feed.insertAdjacentHTML('beforeend', itemHtml);

                // Add listener to update read receipt when the OTHER person plays it
                const audioElement = document.getElementById(`audio-${docId}`);
                if (audioElement && !isMine) {
                    audioElement.addEventListener('play', async () => {
                        if (!data.playedBy.includes(currentUser)) {
                            await updateDoc(doc(db, "voice_notes", docId), {
                                playedBy: arrayUnion(currentUser)
                            });
                        }
                    }, { once: true });
                }
            });
        });

    </script>
</body>
</html>
